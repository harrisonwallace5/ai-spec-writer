<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Spec Writer | Specification</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <main class="site-shell site-shell--wide">
      <section class="hero-card hero-card--compact">
        <div class="hero-card__header hero-card__header--row">
          <div>
            <p class="eyebrow">AI Spec Writer</p>
            <h1>Technical Specification</h1>
            <p class="hero-subtitle">Structured output generated from your product description.</p>
          </div>
          <div class="hero-actions">
            <a class="button button--primary" href="{{ url_for('download', spec_id=spec_id) }}">Download as .txt</a>
            <a class="button button--secondary" href="{{ url_for('index') }}">Generate Another</a>
          </div>
        </div>
      </section>

      <section class="spec-grid">
        {% for section in sections %}
          <article class="spec-card">
            <h2>{{ section.header }}</h2>
            <div class="spec-content">{{ section.content }}</div>
          </article>
        {% endfor %}
      </section>
    </main>
  </body>
</html>
